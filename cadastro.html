<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cadastro - AM Closet</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <header class="loja-topo">
    <div class="topo-linha">
      <a class="marca" href="/">AM CLOSET</a>

      <nav class="menu-loja">
        <a href="/">Início</a>
        <a href="/favoritos.html">Favoritos</a>
        <a href="/cliente.html">Área da Cliente</a>
        <a href="/carrinho.html">Carrinho</a>
        <a href="/pedido.html">Acompanhar Pedido</a>
      </nav>
    </div>
  </header>

  <main class="loja-main">
    <section class="client-hero">
      <span>AM CLOSET</span>
      <h1>Crie seu cadastro</h1>
      <p>Salve seus dados, acompanhe seus favoritos e tenha uma experiência mais rápida na AM Closet.</p>
    </section>

    <section class="client-consult-box cadastro-premium-box">
      <h2>Seus dados</h2>

      <input id="clientName" placeholder="Nome completo" autocomplete="name">
      <input id="clientPhone" placeholder="WhatsApp com DDD">
      <input id="clientEmail" type="email" placeholder="E-mail">

      <button onclick="saveClientProfile()">Cadastrar</button>

      <p id="clientMsg"></p>
    </section>
  </main>

  <footer>
    <h3>AM Closet</h3>
    <p>@useamcloseet</p>
    <p>© 2026 AM Closet - Todos os direitos reservados.</p>
  </footer>

  <script>
    async function saveClientProfile(){
      const name = document.getElementById('clientName').value.trim();
      const phone = document.getElementById('clientPhone').value.trim();
      const email = document.getElementById('clientEmail').value.trim();
      const msg = document.getElementById('clientMsg');

      if (!name || !phone) {
        msg.textContent = 'Preencha nome e WhatsApp.';
        return;
      }

      msg.textContent = 'Salvando cadastro...';

      try {
        const response = await fetch('/api/customers', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            name,
            phone,
            email
          })
        });

        const data = await response.json();

        if (!response.ok || data.error) {
          msg.textContent = data.error || 'Erro ao cadastrar.';
          return;
        }

        localStorage.setItem('amcloset_customer', JSON.stringify({
          name,
          phone,
          email
        }));

        msg.textContent = 'Cadastro realizado com sucesso! Redirecionando para sua área...';

        setTimeout(() => {
          window.location.href = '/cliente.html';
        }, 900);

      } catch (error) {
        msg.textContent = 'Erro ao salvar cadastro.';
      }
    }
  </script>
</body>
</html>
