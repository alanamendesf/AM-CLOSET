<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Painel AM Closet</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <header class="loja-topo">
    <div class="topo-linha">
      <div class="marca">PAINEL AM CLOSET</div>
      <nav class="menu-loja">
        <a href="/">Ver loja</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="panel">
      <h2>Acesso ao painel</h2>
      <input id="pass" placeholder="Senha do painel" type="password">
      <button onclick="loadAdmin()">Entrar / Atualizar</button>
      <p id="adminMsg"></p>
    </section>

    <section class="panel">
      <h2>Dados da loja</h2>
      <input id="storeName" placeholder="Nome da loja">
      <input id="subtitle" placeholder="Frase da loja">
      <input id="whatsapp" placeholder="WhatsApp com DDD">
      <input id="instagram" placeholder="Instagram">
      <button onclick="saveConfig()">Salvar dados</button>
    </section>

    <section class="panel">
      <h2>Novo produto</h2>
      <input id="pname" placeholder="Nome do produto">
      <input id="pprice" placeholder="Preço" type="number" step="0.01">
      <input id="pcat" placeholder="Categoria. Ex: Vestidos, Blusas, Conjuntos">
      <input id="psizes" placeholder="Tamanhos. Ex: P, M, G">
      <input id="pstock" placeholder="Estoque" type="number">
      <textarea id="pdesc" placeholder="Descrição"></textarea>

      <label>Foto do produto</label>
      <input id="pfile" type="file" accept="image/*">
      <input id="pimg" placeholder="Ou cole o link da imagem">

      <button onclick="addProduct()">Adicionar produto</button>
    </section>

    <section>
      <h2>Produtos cadastrados</h2>
      <div id="adminProducts" class="grid"></div>
    </section>

    <section class="panel">
      <h2>Clientes cadastradas</h2>
      <div id="customers"></div>
    </section>

    <section class="panel">
      <h2>Pedidos</h2>
      <div id="orders"></div>
    </section>
  </main>

  <script src="/admin.js?v=20"></script>
</body>
</html>
