<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Painel AM Closet</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <header class="topo">
    <div>
      <h1>Painel AM Closet</h1>
      <p>Edite sua loja sem usar o GitHub</p>
    </div>
    <a href="/">Ver loja</a>
  </header>

  <main>
    <section class="panel">
      <h2>Acesso ao painel</h2>
      <input id="pass" placeholder="Digite a senha do painel" type="password">
      <button onclick="loadAdmin()">Entrar / Atualizar painel</button>
      <p id="adminMsg"></p>
    </section>

    <section class="panel">
      <h2>Dados da loja</h2>

      <input id="storeName" placeholder="Nome da loja">
      <input id="subtitle" placeholder="Frase da loja">
      <input id="whatsapp" placeholder="WhatsApp com DDD. Ex: 85999999999">
      <input id="instagram" placeholder="Instagram. Ex: @amcloset">

      <button onclick="saveConfig()">Salvar dados da loja</button>
    </section>

    <section class="panel">
      <h2>Novo produto</h2>

      <input id="pname" placeholder="Nome do produto">
      <input id="pprice" placeholder="Preço" type="number" step="0.01">
      <input id="pcat" placeholder="Categoria. Ex: Vestidos">
      <input id="psizes" placeholder="Tamanhos. Ex: P, M, G">
      <input id="pstock" placeholder="Estoque" type="number">
      <textarea id="pdesc" placeholder="Descrição"></textarea>

      <label>Foto do produto</label>
      <input id="pfile" type="file" accept="image/*">
      <input id="pimg" placeholder="Ou cole o link da imagem">

      <button onclick="addProduct()">Adicionar produto</button>
    </section>

    <section>
      <h2>Produtos cadastrados</h2>
      <div id="adminProducts" class="grid"></div>
    </section>

    <section>
      <h2>Pedidos</h2>
      <div id="orders"></div>
    </section>
  </main>

  <script src="/admin.js"></script>
</body>
</html>
