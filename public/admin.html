<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Painel AM Closet</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body class="admin-body">
  <main class="admin-layout">

    <section id="loginPanel" class="admin-login">
      <h1>AM Closet</h1>
      <p>Acesso ao painel administrativo</p>

      <input id="pass" placeholder="Senha do painel" type="password">
      <button onclick="loginAdmin()">Entrar</button>

      <a href="/">Voltar para a loja</a>
      <p id="adminMsg"></p>
    </section>

    <section id="adminPanel" class="admin-panel hidden">
      <header class="admin-header">
        <div>
          <h1>Painel AM Closet</h1>
          <p>Gerencie produtos, pedidos, clientes e configurações.</p>
        </div>

        <nav class="admin-tabs">
          <button data-tab="dashboardTab" class="active" onclick="showAdminTab('dashboardTab')">Dashboard</button>
          <button data-tab="productsTab" onclick="showAdminTab('productsTab')">Produtos</button>
          <button data-tab="ordersTab" onclick="showAdminTab('ordersTab')">Pedidos</button>
          <button data-tab="customersTab" onclick="showAdminTab('customersTab')">Clientes</button>
          <button data-tab="settingsTab" onclick="showAdminTab('settingsTab')">Configurações</button>
          <button class="admin-exit" onclick="logoutAdmin()">Sair</button>
        </nav>
      </header>

      <section id="dashboardTab" class="admin-tab active">
        <div class="panel">
          <h2>Resumo da loja</h2>
          <div id="dashboardCards" class="dashboard-cards"></div>
        </div>
      </section>

      <section id="productsTab" class="admin-tab">
        <div class="panel">
          <h2>Novo produto</h2>

          <input id="pname" placeholder="Nome do produto">
          <input id="pprice" placeholder="Preço normal" type="number" step="0.01">
          <input id="ppromo" placeholder="Preço promocional, se houver" type="number" step="0.01">

          <label class="admin-checkbox-line">
            <input id="pisPromo" type="checkbox">
            Ativar promoção para este produto
          </label>

          <label class="admin-checkbox-line">
            <input id="pbestSeller" type="checkbox">
            Marcar como Mais Vendido
          </label>

          <label class="admin-checkbox-line">
            <input id="pfeatured" type="checkbox">
            Marcar como Destaque
          </label>

          <label class="admin-checkbox-line">
            <input id="pvisible" type="checkbox" checked>
            Produto visível na loja
          </label>

          <input id="psales" placeholder="Contagem de vendas" type="number">

          <input id="pcat" placeholder="Categoria. Ex: Vestidos, Blusas, Conjuntos">
          <input id="psizes" placeholder="Tamanhos. Ex: P, M, G">
          <input id="pstock" placeholder="Estoque" type="number">
          <textarea id="pdesc" placeholder="Descrição"></textarea>

          <label>Foto do produto</label>
          <input id="pfile" type="file" accept="image/*">
          <input id="pimg" placeholder="Ou cole o link da imagem">

          <button onclick="addProduct()">Adicionar produto</button>
        </div>

        <div class="panel">
          <h2>Produtos cadastrados</h2>
          <div id="adminProducts" class="grid"></div>
        </div>
      </section>

      <section id="ordersTab" class="admin-tab">
        <div class="panel">
          <h2>Pedidos</h2>
          <div id="orders"></div>
        </div>
      </section>

      <section id="customersTab" class="admin-tab">
        <div class="panel">
          <h2>Clientes cadastrados</h2>
          <div id="customers"></div>
        </div>
      </section>

      <section id="settingsTab" class="admin-tab">
        <div class="panel">
          <h2>Dados da loja</h2>

          <input id="storeName" placeholder="Nome da loja">
          <input id="subtitle" placeholder="Frase da loja">
          <input id="whatsapp" placeholder="WhatsApp com DDD">
          <input id="instagram" placeholder="Instagram">

          <button onclick="saveConfig()">Salvar dados</button>
        </div>
      </section>
    </section>

  </main>

  <script src="/admin.js?v=40"></script>
</body>
</html>
