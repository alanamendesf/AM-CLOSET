<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cadastro - AM Closet</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <header class="loja-topo">
    <div class="topo-linha">
      <a class="marca" href="/">AM CLOSET</a>

      <nav class="menu-loja">
        <a href="/">Início</a>
        <a href="/favoritos.html">♡</a>
        <a href="/cliente.html">Minha Conta AM</a>
        <a href="/carrinho.html">Carrinho</a>
      </nav>
    </div>
  </header>

  <main class="loja-main">
    <section class="client-hero">
      <span>AM CLOSET</span>
      <h1>Crie sua conta</h1>
      <p>Cadastre-se para acessar seus pedidos, favoritos e benefícios.</p>
    </section>

    <section class="client-consult-box cadastro-premium-box">
      <h2>Dados da conta</h2>

      <input id="clientName" placeholder="Nome completo" autocomplete="name">
      <input id="clientCpf" placeholder="CPF">
      <input id="clientPhone" placeholder="WhatsApp com DDD">
      <input id="clientEmail" type="email" placeholder="E-mail">
      <input id="clientPassword" type="password" placeholder="Crie uma senha">
      <input id="clientPasswordConfirm" type="password" placeholder="Confirme sua senha">

      <button onclick="createClientAccount()">Criar conta</button>

      <p id="clientMsg"></p>

      <a class="page-button" href="/cliente.html">Já tenho conta</a>
    </section>
  </main>

  <footer>
    <h3>AM Closet</h3>
    <p>@useamcloseet</p>
    <p>© 2026 AM Closet - Todos os direitos reservados.</p>
  </footer>

  <script>
    function onlyNumbers(value){
      return String(value || '').replace(/\D/g, '');
    }

    async function createClientAccount(){
      const name = document.getElementById('clientName').value.trim();
      const cpf = onlyNumbers(document.getElementById('clientCpf').value);
      const phone = document.getElementById('clientPhone').value.trim();
      const email = document.getElementById('clientEmail').value.trim();
      const password = document.getElementById('clientPassword').value.trim();
      const passwordConfirm = document.getElementById('clientPasswordConfirm').value.trim();
      const msg = document.getElementById('clientMsg');

      if (!name || !cpf || !phone || !password || !passwordConfirm) {
        msg.textContent = 'Preencha nome, CPF, WhatsApp e senha.';
        return;
      }

      if (cpf.length !== 11) {
        msg.textContent = 'Digite um CPF válido com 11 números.';
        return;
      }

      if (password.length < 4) {
        msg.textContent = 'A senha precisa ter pelo menos 4 caracteres.';
        return;
      }

      if (password !== passwordConfirm) {
        msg.textContent = 'As senhas não conferem.';
        return;
      }

      msg.textContent = 'Criando sua conta...';

      try {
        const response = await fetch('/api/customers', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            name,
            cpf,
            phone,
            email,
            password
          })
        });

        const data = await response.json();

        if (!response.ok || data.error) {
          msg.textContent = data.error || 'Erro ao criar conta.';
          return;
        }

        localStorage.setItem('amcloset_customer', JSON.stringify(data.customer));

        msg.textContent = 'Conta criada com sucesso! Redirecionando...';

        setTimeout(() => {
          window.location.href = '/cliente.html';
        }, 900);

      } catch (error) {
        msg.textContent = 'Erro ao criar conta.';
      }
    }
  </script>
</body>
</html>
