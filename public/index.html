<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AM Closet</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <header class="loja-topo">
    <div class="topo-linha">
      <div class="marca">AM CLOSET</div>

      <nav class="menu-loja">
        <a href="/">Início</a>
        <span class="separador"></span>
        <a href="#products">Produtos</a>
      </nav>

      <a class="carrinho-topo" href="#cart">Carrinho</a>
    </div>
  </header>

  <main class="loja-main">
    <section class="intro-loja">
      <h1 id="storeNameText">AM Closet</h1>
    </section>

    <section class="vitrine">
      <h2>Produtos</h2>
      <div id="products" class="grid"></div>
    </section>

    <aside id="cart" class="cart">
      <h2>Carrinho</h2>
      <div id="cartItems"></div>

      <strong id="total">Total: R$ 0,00</strong>

      <input id="name" placeholder="Seu nome">
      <input id="email" placeholder="Seu e-mail">

      <button onclick="checkout()">Finalizar compra</button>
      <p id="msg"></p>
    </aside>
  </main>

 <a class="whatsapp" id="whatsappFloat" href="#" target="_blank">
  WhatsApp
</a>

<a class="instagram-float"
   href="https://instagram.com/useamcloseet"
   target="_blank">
  Instagram
</a>

  <footer>
    <h3 id="footerStoreName">AM Closet</h3>
    <p id="footerInstagram">@amcloset</p>
    <p>© 2026 AM Closet - Todos os direitos reservados.</p>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
