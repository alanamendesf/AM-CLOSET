```
<section class="vitrine">
  <h2>Produtos</h2>

  <div id="categoryTabs" class="category-tabs"></div>

  <div id="products" class="grid"></div>
</section>

<section id="cadastro" class="cart">
  <h2>Cadastro</h2>

  <input id="clientName" placeholder="Seu nome" autocomplete="name">
  <input id="clientEmail" placeholder="Seu e-mail" autocomplete="email">
  <input id="clientPhone" placeholder="Seu WhatsApp">

  <button onclick="saveClient()">Cadastrar</button>

  <p id="clientMsg"></p>
</section>

<aside id="cart" class="cart">
  <h2>Carrinho</h2>

  <div id="cartItems"></div>

  <strong id="total">Total: R$ 0,00</strong>

  <div style="margin:15px 0;">
    <strong>Forma de pagamento</strong>

    <div style="margin-top:10px;">
      <label>
        <input type="radio" name="paymentMethod" value="pix">
        PIX (acréscimo de 0,99% referente à taxa do Mercado Pago)
      </label>
    </div>

    <div style="margin-top:8px;">
      <label>
        <input type="radio" name="paymentMethod" value="card" checked>
        Cartão de Crédito/Débito (acréscimo de 4,98% referente à taxa do Mercado Pago)
      </label>
    </div>
  </div>

  <input id="name" placeholder="Seu nome" autocomplete="name">
  <input id="email" placeholder="Seu e-mail" autocomplete="email">

  <button onclick="checkout()">Finalizar compra</button>

  <p id="msg"></p>
</aside>
```
